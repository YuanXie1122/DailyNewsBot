name: Daily news bot

on:
  schedule:
    - cron: "17 9 * * *"
      timezone: "America/New_York"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

concurrency:
  group: daily-news-bot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    env:
      TZ: America/New_York
      PYTHONUNBUFFERED: "1"
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      OPENAI_MODEL: ${{ secrets.OPENAI_MODEL }}
      SMTP_HOST: ${{ secrets.SMTP_HOST }}
      SMTP_USERNAME: ${{ secrets.SMTP_USERNAME }}
      SMTP_PASSWORD: ${{ secrets.SMTP_PASSWORD }}
      SENDER_EMAIL: ${{ secrets.SENDER_EMAIL }}
      RECIPIENT_EMAIL: ${{ secrets.RECIPIENT_EMAIL }}

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Show files
        run: |
          pwd
          ls -la
          echo "------"
          test -f bot.py && echo "bot.py exists" || echo "bot.py missing"
          test -f requirements.txt && echo "requirements.txt exists" || echo "requirements.txt missing"

      - name: Check secrets
        run: |
          [ -n "$OPENAI_API_KEY" ] && echo "OPENAI_API_KEY ok" || echo "OPENAI_API_KEY missing"
          [ -n "$SMTP_HOST" ] && echo "SMTP_HOST ok" || echo "SMTP_HOST missing"
          [ -n "$SMTP_USERNAME" ] && echo "SMTP_USERNAME ok" || echo "SMTP_USERNAME missing"
          [ -n "$SMTP_PASSWORD" ] && echo "SMTP_PASSWORD ok" || echo "SMTP_PASSWORD missing"
          [ -n "$SENDER_EMAIL" ] && echo "SENDER_EMAIL ok" || echo "SENDER_EMAIL missing"
          [ -n "$RECIPIENT_EMAIL" ] && echo "RECIPIENT_EMAIL ok" || echo "RECIPIENT_EMAIL missing"

      - name: Install dependencies
        run: |
          python -V
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip list

      - name: Run bot once
        run: |
          python bot.py run-once
